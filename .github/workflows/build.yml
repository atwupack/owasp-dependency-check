name: Build main
permissions:
  contents: read
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.BASE_NODE_VERSION }}
          cache: "pnpm"
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest
          cache: true
      - run: pnpm install
      - run: pnpm run build
      - run: pnpm run validate
      - run: pnpm test
      - run: pnpm run owasp -- --help
      - run: pnpm run owasp -- --version
